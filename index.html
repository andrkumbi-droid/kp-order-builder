<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>KP Order Builder</title>
<style>
  :root{
    --bg:#0f1216; --panel:#171b21; --panel2:#1e242c; --line:#2a323c;
    --txt:#e7ecf2; --muted:#93a1b0; --accent:#3b82f6; --accent2:#22c55e;
    --danger:#ef4444; --chip:#232a33; --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.4 system-ui,Segoe UI,Roboto,Arial,sans-serif}
  button{font:inherit;cursor:pointer}
  input,select,textarea{font:inherit}
  .hide{display:none!important}

  /* top bar */
  .top{display:flex;gap:10px;align-items:center;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;flex-wrap:wrap}
  .top h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.3px}
  .top h1 span{color:var(--accent)}
  .top .grow{flex:1}
  .ordname{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;min-width:180px}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.green{background:var(--accent2);border-color:var(--accent2);color:#04220f}
  .btn.ghost{background:transparent}
  .cloud{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%;background:#6b7280}
  .dot.ok{background:var(--accent2)} .dot.err{background:var(--danger)}

  /* layout */
  .wrap{display:grid;grid-template-columns:minmax(360px,1fr) minmax(420px,1.15fr);gap:0;min-height:calc(100vh - 55px)}
  @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  .composer{padding:16px;border-right:1px solid var(--line);overflow:auto}
  .board{padding:16px;background:#12161b;overflow:auto}

  .step{margin-bottom:18px}
  .step h2{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:0 0 8px;display:flex;align-items:center;gap:8px}
  .step h2 .num{background:var(--chip);color:var(--txt);width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
  .step h2 .pick{margin-left:auto;color:var(--accent2);font-weight:600;text-transform:none;letter-spacing:0}

  .tiles{display:flex;gap:8px;flex-wrap:wrap}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px;width:112px;text-align:center;position:relative;transition:.12s}
  .tile:hover{border-color:var(--accent)}
  .tile.sel{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2) inset}
  .tile .thumb{width:96px;height:72px;border-radius:6px;object-fit:cover;background:#0c0f13;display:block;margin:0 auto 6px}
  .tile .cap{font-size:12px;font-weight:600;word-break:break-word;line-height:1.2}
  .tile .sub{font-size:11px;color:var(--muted);margin-top:2px}
  .tile .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);border:none;color:#fff;width:18px;height:18px;border-radius:50%;line-height:1;font-size:12px;display:none}
  .tile:hover .del{display:block}
  .tile .edit{position:absolute;top:2px;left:2px;background:rgba(59,130,246,.85);border:none;color:#fff;width:18px;height:18px;border-radius:50%;line-height:1;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}
  @media(hover:hover){.tile .del{display:none}}
  .tile.add{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);border-style:dashed;min-height:108px}
  .tile.add .plus{font-size:26px;line-height:1}
  .swatchgrid .tile{width:92px}
  .swatchgrid .tile .thumb{width:76px;height:76px}
  /* book covers are portrait — show the whole cover instead of cropping it */
  .tile[data-kind="book"] .thumb{height:120px;object-fit:contain}
  /* panels: show the whole panel (not a zoomed-in slice) */
  .tile[data-kind="panel"] .thumb{object-fit:contain}

  .qtyrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .qtyrow input[type=number]{width:130px;padding:10px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:16px;font-weight:700}
  .field{padding:10px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--txt);width:100%}

  /* accessories */
  .acc{display:flex;flex-direction:column;gap:8px}
  .accrow{display:flex;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px}
  .accrow.off{opacity:.5}
  .accrow img{width:48px;height:36px;object-fit:cover;border-radius:5px;background:#0c0f13}
  .accrow .an{flex:1}
  .accrow .an b{display:block}
  .accrow .an small{color:var(--muted)}
  .accrow input.code{width:90px}
  .accrow input.q{width:80px}
  .accrow .pct{font-size:11px;color:var(--muted);white-space:nowrap}
  .accrow input.code,.accrow input.q{padding:7px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
  .accrow .tg{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:var(--panel2);display:flex;align-items:center;justify-content:center;color:var(--accent2);font-weight:800}
  .accrow.off .tg{color:transparent}

  .addline{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 30%);padding-top:14px;margin-top:6px}

  /* quick add by code */
  .quickadd{background:linear-gradient(135deg,#16273c,#171b21);border:1px solid var(--accent);border-radius:12px;padding:12px 14px;margin-bottom:18px}
  .quickadd h2{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);display:flex;align-items:center;gap:6px}
  .quickadd input.field{font-size:16px;font-weight:600}
  .qa-card{display:flex;gap:10px;align-items:center;margin-top:10px;background:var(--panel);border:1px solid var(--accent2);border-radius:10px;padding:8px}
  .qa-card img{width:54px;height:54px;object-fit:cover;border-radius:6px;background:#0c0f13;flex:none}
  .qa-meta{flex:1;min-width:0}
  .qa-meta b{display:block;font-size:16px}
  .qa-meta small{display:block;color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .qa-card input.q{width:84px;padding:9px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:16px;font-weight:700}
  .qa-new{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.4}

  /* products overview */
  .modal.wide{width:min(1060px,100%)}
  .ptable{width:100%;border-collapse:collapse;font-size:12px}
  .ptable th{position:sticky;top:0;background:var(--panel);z-index:1;text-align:left;color:var(--muted);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
  .ptable td{padding:5px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
  .ptable img{width:44px;height:44px;object-fit:cover;border-radius:5px;background:#0c0f13;display:block}
  .ptable tbody tr:hover{background:var(--panel2)}
  .ptable input.price{width:72px;padding:5px;border-radius:5px;background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
  .ptable .pbaht{color:var(--accent2);font-weight:700}
  .ptable .pcode{font-weight:700}
  .ptable tr.poff{opacity:.42}
  .ptable tr.poff .pcode{text-decoration:line-through}
  .ptable input.pavail{width:18px;height:18px;accent-color:var(--accent2);cursor:pointer}
  .ptable input.psel{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
  .ptable tr.picked{background:rgba(59,130,246,.12)}
  .ptable td.selnum{color:var(--accent);font-weight:700;text-align:center;font-size:11px}
  /* Products as a full page (not a dialog) */
  #prodOverlay{background:var(--bg);padding:0}
  #prodOverlay>.modal{width:100%;max-width:100%;height:100vh;max-height:100vh;border:none;border-radius:0;display:flex;flex-direction:column;padding:12px 16px}
  /* new-order side panel on the Products page */
  .prodmain{display:flex;flex:1;min-height:0;gap:12px}
  .prodleft{display:flex;flex-direction:column;flex:1;min-width:0}
  .prodtools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .ordpanel{width:16%;min-width:220px;max-width:340px;background:var(--panel);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;min-height:0}
  .ordpanel h4{margin:0;padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;display:flex;align-items:center;gap:6px}
  .ordpanel h4 .oc{margin-left:auto;background:var(--accent);color:#fff;border-radius:20px;font-size:11px;padding:1px 8px;font-weight:700}
  .ordpanel .olist{flex:1;min-height:0;overflow:auto;padding:8px}
  .ordpanel .oempty{color:var(--muted);font-size:12px;padding:16px 6px;text-align:center;line-height:1.5}
  .oline{display:flex;gap:8px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px;margin-bottom:6px}
  .oline img{width:34px;height:34px;object-fit:cover;border-radius:5px;background:#0c0f13;flex:none}
  .oline .oinfo{flex:1;min-width:0}
  .oline .ocode{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .oline .osub{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .oline input.oqty{width:56px;padding:5px;border-radius:6px;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-size:12px;text-align:right}
  .oline .orm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px}
  .oline .orm:hover{color:var(--danger)}
  .ordpanel .ofoot{padding:10px 12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .ordpanel .ofoot .btn{width:100%}

  /* board cards */
  .board h2{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .board h2 .count{background:var(--accent);color:#fff;border-radius:20px;padding:1px 8px;font-size:12px}
  .cards{display:flex;flex-direction:column;gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;display:grid;grid-template-columns:88px 1fr auto;gap:12px;position:relative}
  .card .qtytop{position:absolute;top:-9px;left:12px;background:var(--accent2);color:#04220f;font-weight:800;font-size:12px;padding:2px 10px;border-radius:20px}
  .card .pimg{width:88px;height:88px;object-fit:cover;border-radius:8px;background:#0c0f13}
  .card .mid{min-width:0}
  .card .code{font-size:18px;font-weight:800;letter-spacing:.5px}
  .card .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .card .colorline{display:flex;gap:8px;align-items:center;margin-top:8px}
  .card .colorline img{width:34px;height:34px;border-radius:6px;object-fit:cover;background:#0c0f13}
  .card .colorline b{font-size:12px}
  .card .accs{display:flex;flex-direction:column;gap:6px;text-align:right;font-size:12px}
  .card .accs .a{display:flex;gap:6px;align-items:center;justify-content:flex-end}
  .card .accs .a img{width:26px;height:20px;object-fit:cover;border-radius:4px;background:#0c0f13}
  .card .rm{position:absolute;top:8px;right:8px;background:transparent;border:none;color:var(--muted);font-size:16px}
  .card .rm:hover{color:var(--danger)}
  .empty{color:var(--muted);text-align:center;padding:40px 10px;border:1px dashed var(--line);border-radius:12px}

  /* modal */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;width:min(440px,100%);max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 12px}
  .modal label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
  .modal .row{display:flex;gap:8px}
  .modal .row>*{flex:1}
  .uparea{border:1px dashed var(--line);border-radius:10px;padding:14px;text-align:center;color:var(--muted);cursor:pointer}
  .uparea img{max-width:100%;max-height:140px;border-radius:8px;margin-top:8px}
  .modal .foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

  /* print board */
  @media print{
    body{background:#fff;color:#000}
    .top,.composer,.board h2,.card .rm,.noprint{display:none!important}
    .wrap{display:block}
    .board{background:#fff;padding:0}
    #printTitle{display:block!important;font-size:18px;font-weight:800;margin-bottom:10px}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .card{border:1px solid #ccc;break-inside:avoid;background:#fff;color:#000}
    .card .code{color:#000}
    .card .qtytop{background:#e5e7eb;color:#000}
    .card .meta,.card .accs,.card .colorline b{color:#111}
  }
  #printTitle{display:none}
</style>
</head>
<body>

<div class="top">
  <h1>KP <span>Order Builder</span></h1>
  <input id="ordName" class="ordname" placeholder="Order name / PO no."/>
  <div class="grow"></div>
  <button class="btn ghost" id="btnNew">New order</button>
  <button class="btn" id="btnImport">Import PI</button>
  <button class="btn" id="btnDrive">⛁ Drive</button>
  <input type="file" id="importFile" accept=".xlsx" multiple style="display:none">
  <button class="btn" id="btnLoad">Open</button>
  <button class="btn" id="btnSave">Save</button>
  <button class="btn" id="btnProducts">📋 Products</button>
  <button class="btn" id="btnPhotos">📷 Catalog</button>
  <button class="btn primary" id="btnPdf">Export PDF</button>
  <button class="btn green" id="btnXls">Export Excel</button>
  <span class="cloud"><span class="dot" id="cloudDot"></span><span id="cloudTxt">connecting…</span></span>
</div>

<div class="wrap">
  <!-- COMPOSER -->
  <div class="composer">
    <div class="quickadd">
      <h2>⚡ Quick add by product code</h2>
      <input id="qCode" class="field" placeholder="Type a saved code — e.g. KP019 — auto-fills everything" autocomplete="off"/>
      <div id="qInfo"></div>
    </div>

    <div class="step" id="s-supplier">
      <h2><span class="num">1</span> Supplier <span class="pick" data-pick="supplier"></span></h2>
      <div class="tiles" id="tiles-supplier"></div>
    </div>

    <div class="step" id="s-panel">
      <h2><span class="num">2</span> Panel type <span class="pick" data-pick="panel"></span></h2>
      <div class="tiles" id="tiles-panel"></div>
    </div>

    <div class="step" id="s-book">
      <h2><span class="num">3</span> Color book <span class="pick" data-pick="book"></span></h2>
      <div class="tiles" id="tiles-book"></div>
    </div>

    <div class="step" id="s-color">
      <h2><span class="num">4</span> Color <span class="pick" data-pick="color"></span></h2>
      <div class="tiles swatchgrid" id="tiles-color"></div>
    </div>

    <div class="step">
      <h2><span class="num">5</span> Quantity (pcs)</h2>
      <div class="qtyrow">
        <input type="number" id="qty" min="0" step="1" placeholder="e.g. 2400"/>
        <span style="color:var(--muted)">panels</span>
      </div>
    </div>

    <div class="step">
      <h2><span class="num">6</span> Accessories</h2>
      <div class="acc" id="accList"></div>
      <button class="btn ghost" id="btnAddAcc" style="margin-top:8px">+ New accessory type</button>
    </div>

    <div class="step">
      <h2><span class="num">7</span> Product code / name</h2>
      <input class="field" id="prodCode" placeholder="e.g. KP052 / K-PVC-14"/>
    </div>

    <div class="addline">
      <button class="btn primary" id="btnAddLine" style="width:100%;padding:12px;font-size:15px;font-weight:700">Add to order ↵</button>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board">
    <div id="printTitle"></div>
    <h2>Order board <span class="count" id="lineCount">0</span> <span style="margin-left:auto;font-size:11px;color:var(--muted)" class="noprint">click a card to edit</span></h2>
    <div class="cards" id="cards"></div>
  </div>
</div>

<!-- generic add modal -->
<div class="ov hide" id="modal">
  <div class="modal" id="modalBox"></div>
</div>
<div class="ov hide" id="prodOverlay">
  <div class="modal wide" id="prodBox"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
(function(){
"use strict";

/* ---------- Firebase ---------- */
var db=null, online=false;
try{
  firebase.initializeApp({
    apiKey:"AIzaSyBhUzwMR28dvulez9q6AZ4gZS80Y9VK0qQ",
    authDomain:"kp-wallpanel.firebaseapp.com",
    databaseURL:"https://kp-wallpanel-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:"kp-wallpanel",
    storageBucket:"kp-wallpanel.firebasestorage.app",
    messagingSenderId:"794246593779",
    appId:"1:794246593779:web:703fc0a4ba89ba58734b86"
  });
  db=firebase.database();
}catch(e){ console.warn(e); }
var OB='orderBuilder';
var IMG_BASE='https://andrkumbi-droid.github.io/kp-wallpanel/img/products/';

function setCloud(state,txt){
  var d=document.getElementById('cloudDot');
  d.className='dot'+(state==='ok'?' ok':state==='err'?' err':'');
  document.getElementById('cloudTxt').textContent=txt;
}

/* ---------- catalog state ---------- */
var cat={ suppliers:{}, panelTypes:{}, colorBooks:{}, colors:{}, accessories:{}, products:{}, webCatalog:{} };
var thbRate=36.5; // USD -> THB, editable in Products view (stored in orderBuilder/settings/thbRate)
function watch(node,key){
  if(!db) return;
  db.ref(OB+'/'+node).on('value',function(s){ cat[key]=s.val()||{}; renderTiles(); renderAcc(); },function(err){ setCloud('err','db read blocked'); });
}
if(db){
  setCloud('','connecting…');
  db.ref('.info/connected').on('value',function(s){
    online=!!s.val(); setCloud(online?'ok':'err', online?'synced':'offline');
  });
  watch('suppliers','suppliers');
  watch('panelTypes','panelTypes');
  watch('colorBooks','colorBooks');
  watch('colors','colors');
  watch('accessories','accessories');
  db.ref(OB+'/products').on('value',function(s){ cat.products=s.val()||{}; },function(){});
  db.ref(OB+'/settings/thbRate').on('value',function(s){ var v=s.val(); if(v) thbRate=parseFloat(v)||thbRate; },function(){});
  db.ref('pub/webCatalog').on('value',function(s){ cat.webCatalog=s.val()||{}; },function(){});
  seedDefaults();
}else{ setCloud('err','no firebase'); }

function dbPush(node,obj){
  if(!db){ alert('No DB connection'); return Promise.reject(); }
  var ref=db.ref(OB+'/'+node).push();
  return ref.set(obj).then(function(){ return ref.key; })
    .catch(function(e){ setCloud('err','write blocked'); alert('Could not save to cloud:\n'+e.message); throw e; });
}
function dbRemove(node,id){ if(db) db.ref(OB+'/'+node+'/'+id).remove().catch(function(){}); }

/* seed a few defaults once (only if empty) */
function seedDefaults(){
  db.ref(OB+'/_seeded').once('value').then(function(s){
    if(s.val()) return;
    db.ref(OB+'/_seeded').set(Date.now());
    var sup=[
      {name:'Jinhua Xinyt',addr:'NO.1379 Jingang Road, Fucun Town, Jinhua City, Zhejiang, China',fob:'FOB Ningbo',hs:'3925900000'},
      {name:'Shidai Haipai',addr:'',fob:'',hs:''}
    ];
    var books=[
      {name:'Wooden Series',brand:'PVC / WPC 2026'},
      {name:'Shidai Haipai',brand:'PVC 木纹 2025-5'},
      {name:'Fashion Film 2026',brand:'Jacky · Pink · Vladimir'},
      {name:'WPC Wall Panel',brand:'Wooden Grille Swatch'},
      {name:'RF Aesthetics',brand:'2024 全屋定制'}
    ];
    var panels=[
      {name:'PVC Panel',material:'PVC',size:'400*7*2900mm'},
      {name:'PVC Panel',material:'PVC',size:'200*12*2900mm'},
      {name:'WPC Panel',material:'WPC',size:'165*22*2900mm'}
    ];
    var accs=[
      {atype:'L-Profile',code:'L',pct:30},
      {atype:'T-Trim',code:'T',pct:6},
      {atype:'U-Profile',code:'U',pct:5},
      {atype:'Clips',code:'CLIP',pct:0,unit:'ctn'}
    ];
    sup.forEach(function(x){ db.ref(OB+'/suppliers').push(x); });
    books.forEach(function(x){ db.ref(OB+'/colorBooks').push(x); });
    panels.forEach(function(x){ db.ref(OB+'/panelTypes').push(x); });
    accs.forEach(function(x){ db.ref(OB+'/accessories').push(x); });
  }).catch(function(){});
}

/* ---------- current selection / line being built ---------- */
var sel={ supplier:null, panel:null, book:null, color:null };
var accState={}; // accId -> {on,qty,code}
var editingIndex=-1;

/* ---------- current order ---------- */
var order={ name:'', supplierId:null, lines:[] };
var LS='kp-orderbuilder-current';
function saveLocal(){ try{ localStorage.setItem(LS,JSON.stringify(order)); }catch(e){} }
function loadLocal(){ try{ var v=localStorage.getItem(LS); if(v){ order=JSON.parse(v); document.getElementById('ordName').value=order.name||''; } }catch(e){} }

/* ---------- helpers ---------- */
function el(id){ return document.getElementById(id); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function entries(o){ return Object.keys(o||{}).map(function(k){ return [k,o[k]]; }); }
function productImg(code,fallback){
  code=(code||'').trim().toUpperCase();
  if(code && cat.webCatalog[code]) return IMG_BASE+code+'.jpg';
  return fallback||'';
}

/* ---------- render tiles ---------- */
function renderTiles(){
  // supplier
  tilesInto('tiles-supplier', cat.suppliers, 'supplier', function(v){
    return { img:v.img, cap:v.name, sub:v.fob||'' };
  });
  // panel
  tilesInto('tiles-panel', cat.panelTypes, 'panel', function(v){
    return { img:v.img, cap:(v.material||'')+' '+(v.name||''), sub:v.size||'' };
  });
  // book
  tilesInto('tiles-book', cat.colorBooks, 'book', function(v){
    return { img:v.img, cap:v.name, sub:v.brand||'' };
  });
  // colors (filter by selected book)
  var colorsFiltered={};
  entries(cat.colors).forEach(function(e){
    if(!sel.book || e[1].bookId===sel.book) colorsFiltered[e[0]]=e[1];
  });
  tilesInto('tiles-color', colorsFiltered, 'color', function(v){
    return { img:v.img, cap:v.number||v.page||'color', sub:v.page&&v.number?v.page:'' };
  });
  refreshPicks();
}

function tilesInto(containerId, obj, kind, mapFn){
  var c=el(containerId); if(!c) return;
  var html='';
  entries(obj).forEach(function(e){
    var id=e[0], m=mapFn(e[1]);
    var selCls=(sel[kind]===id)?' sel':'';
    html+='<div class="tile'+selCls+'" data-kind="'+kind+'" data-id="'+id+'">'+
      '<button class="edit" data-edit="'+kind+'" data-id="'+id+'" title="edit">✎</button>'+
      '<button class="del" data-del="'+kind+'" data-id="'+id+'">×</button>'+
      (m.img?'<img class="thumb" src="'+esc(m.img)+'">':'<div class="thumb"></div>')+
      '<div class="cap">'+esc(m.cap||'')+'</div>'+
      (m.sub?'<div class="sub">'+esc(m.sub)+'</div>':'')+
    '</div>';
  });
  var addLabel = kind==='color' && !sel.book ? 'pick book first' : 'New';
  html+='<div class="tile add" data-add="'+kind+'"><div class="plus">+</div><div>'+addLabel+'</div></div>';
  c.innerHTML=html;
}

function refreshPicks(){
  setPick('supplier', sel.supplier && cat.suppliers[sel.supplier] && cat.suppliers[sel.supplier].name);
  setPick('panel', sel.panel && cat.panelTypes[sel.panel] && ((cat.panelTypes[sel.panel].material||'')+' '+(cat.panelTypes[sel.panel].size||'')));
  setPick('book', sel.book && cat.colorBooks[sel.book] && cat.colorBooks[sel.book].name);
  setPick('color', sel.color && cat.colors[sel.color] && ((cat.colors[sel.color].page||'')+' '+(cat.colors[sel.color].number||'')));
}
function setPick(kind,val){ var e=document.querySelector('.pick[data-pick="'+kind+'"]'); if(e) e.textContent=val?('✓ '+val):''; }

/* ---------- accessories ---------- */
function renderAcc(){
  var c=el('accList'); if(!c) return; var html='';
  entries(cat.accessories).forEach(function(e){
    var id=e[0], a=e[1];
    var st=accState[id]||{on:false,qty:'',code:''};
    html+='<div class="accrow'+(st.on?'':' off')+'" data-acc="'+id+'">'+
      '<button class="tg" data-tg="'+id+'">✓</button>'+
      (a.img?'<img src="'+esc(a.img)+'">':'<img>')+
      '<div class="an"><b>'+esc(a.atype||a.code||'')+'</b><small>'+esc(a.pct?('~'+a.pct+'% of qty'):(a.unit||''))+'</small></div>'+
      '<input class="code" data-accfield="code" data-id="'+id+'" placeholder="code" value="'+esc(st.code||a.code||'')+'">'+
      '<input class="q" type="number" data-accfield="qty" data-id="'+id+'" placeholder="qty" value="'+esc(st.qty||'')+'">'+
      '<button class="tg" data-edit="accessory" data-id="'+id+'" title="edit type" style="color:var(--accent)">✎</button>'+
    '</div>';
  });
  c.innerHTML=html;
}
function autoAccQty(){
  var q=parseFloat(el('qty').value)||0;
  entries(cat.accessories).forEach(function(e){
    var id=e[0], a=e[1], st=accState[id];
    if(st&&st.on&&a.pct&&(!st.qty||st._auto)){ st.qty=Math.round(q*a.pct/100); st._auto=true; }
  });
  renderAcc();
}

/* ---------- click handling ---------- */
document.addEventListener('click',function(ev){
  var t=ev.target;
  // delete catalog item
  var del=t.closest&&t.closest('[data-del]');
  if(del){ ev.stopPropagation();
    var kind=del.getAttribute('data-del'), id=del.getAttribute('data-id');
    var node={supplier:'suppliers',panel:'panelTypes',book:'colorBooks',color:'colors'}[kind];
    if(confirm('Delete this item from catalog?')){ dbRemove(node,id); if(sel[kind]===id) sel[kind]=null; }
    return;
  }
  // edit catalog item
  var edit=t.closest&&t.closest('[data-edit]');
  if(edit){ ev.stopPropagation(); openAdd(edit.getAttribute('data-edit'), edit.getAttribute('data-id')); return; }
  // add new catalog item
  var add=t.closest&&t.closest('[data-add]');
  if(add){ openAdd(add.getAttribute('data-add')); return; }
  // select tile
  var tile=t.closest&&t.closest('.tile[data-kind]');
  if(tile){
    var k=tile.getAttribute('data-kind'), id=tile.getAttribute('data-id');
    sel[k]=(sel[k]===id?null:id);
    if(k==='book') sel.color=null; // reset color when book changes
    if(k==='supplier'){ order.supplierId=sel.supplier; }
    renderTiles();
    return;
  }
  // accessory toggle
  var tg=t.getAttribute&&t.getAttribute('data-tg');
  if(tg){ accState[tg]=accState[tg]||{on:false,qty:'',code:''}; accState[tg].on=!accState[tg].on; autoAccQty(); return; }
  // card click -> edit
  var card=t.closest&&t.closest('.card[data-idx]');
  if(card && !(t.closest&&t.closest('.rm'))){ editLine(parseInt(card.getAttribute('data-idx'),10)); return; }
  // card remove
  var rm=t.closest&&t.closest('.rm');
  if(rm){ ev.stopPropagation(); order.lines.splice(parseInt(rm.getAttribute('data-idx'),10),1); renderCards(); saveLocal(); return; }
});
document.addEventListener('input',function(ev){
  var t=ev.target, f=t.getAttribute&&t.getAttribute('data-accfield');
  if(f){ var id=t.getAttribute('data-id'); accState[id]=accState[id]||{on:true,qty:'',code:''}; accState[id].on=true; accState[id][f]=t.value; if(f==='qty') accState[id]._auto=false; renderAcc && null; if(f==='qty'){/*keep*/} return; }
  if(t.id==='qty'){ autoAccQty(); }
  if(t.id==='ordName'){ order.name=t.value; saveLocal(); }
});

/* ---------- add modal ---------- */
var pendingImg=null;
var NODEMAP={supplier:'suppliers',panel:'panelTypes',book:'colorBooks',color:'colors',accessory:'accessories'};
function openAdd(kind, editId){
  if(kind==='color' && !editId && !sel.book){ alert('Please pick a color book first.'); return; }
  var node=NODEMAP[kind];
  var ex = editId ? (cat[node] && cat[node][editId]) : null;
  pendingImg = ex && ex.img ? ex.img : null;
  var T = editId ? 'Edit' : 'New';
  var box=el('modalBox'), h='';
  if(kind==='supplier'){
    h='<h3>'+T+' supplier</h3>'+
      '<label>Name</label><input class="field" id="f_name">'+
      '<label>Address</label><input class="field" id="f_addr">'+
      '<div class="row"><div><label>FOB / port</label><input class="field" id="f_fob"></div><div><label>HS code</label><input class="field" id="f_hs"></div></div>';
  }else if(kind==='panel'){
    h='<h3>'+T+' panel type</h3>'+
      '<div class="row"><div><label>Name</label><input class="field" id="f_name" placeholder="Panel"></div>'+
      '<div><label>Material</label><select class="field" id="f_mat"><option value="">—</option><option>PVC</option><option>WPC</option></select></div></div>'+
      '<label>Size</label><input class="field" id="f_size" placeholder="400*7*2900mm">';
  }else if(kind==='book'){
    h='<h3>'+T+' color book</h3>'+
      '<label>Book name</label><input class="field" id="f_name">'+
      '<label>Brand / edition</label><input class="field" id="f_brand">';
  }else if(kind==='color'){
    var bk=cat.colorBooks[(ex&&ex.bookId)||sel.book];
    h='<h3>'+T+' color · '+esc(bk?bk.name:'')+'</h3>'+
      '<div class="row"><div><label>Page (P.xxx)</label><input class="field" id="f_page" placeholder="P.076"></div>'+
      '<div><label>Color number</label><input class="field" id="f_num" placeholder="60134-9"></div></div>';
  }else if(kind==='accessory'){
    h='<h3>'+T+' accessory type</h3>'+
      '<div class="row"><div><label>Type</label><input class="field" id="f_at" placeholder="L-Profile"></div>'+
      '<div><label>Code prefix</label><input class="field" id="f_code" placeholder="L"></div></div>'+
      '<div class="row"><div><label>Suggested %</label><input class="field" id="f_pct" type="number" placeholder="30"></div>'+
      '<div><label>Unit (opt)</label><input class="field" id="f_unit" placeholder="ctn"></div></div>';
  }
  h+='<label>Photo</label><div class="uparea" id="uparea">Tap to upload / take photo'+
     '<input type="file" accept="image/*" id="fileIn" style="display:none">'+
     '<div id="prev"></div></div>'+
     '<div class="foot">'+(editId?'<button class="btn" id="mDel" style="margin-right:auto;color:var(--danger)">Delete</button>':'')+'<button class="btn ghost" id="mCancel">Cancel</button><button class="btn primary" id="mSave">Save</button></div>';
  box.innerHTML=h;
  // prefill on edit
  function set(id,v){ var e=el(id); if(e) e.value=(v==null?'':v); }
  if(ex){
    if(kind==='supplier'){ set('f_name',ex.name); set('f_addr',ex.addr); set('f_fob',ex.fob); set('f_hs',ex.hs); }
    else if(kind==='panel'){ set('f_name',ex.name); set('f_mat',ex.material); set('f_size',ex.size); }
    else if(kind==='book'){ set('f_name',ex.name); set('f_brand',ex.brand); }
    else if(kind==='color'){ set('f_page',ex.page); set('f_num',ex.number); }
    else if(kind==='accessory'){ set('f_at',ex.atype); set('f_code',ex.code); set('f_pct',ex.pct); set('f_unit',ex.unit); }
  }
  if(pendingImg){ var pv=el('prev'); if(pv) pv.innerHTML='<img src="'+esc(pendingImg)+'">'; }
  el('modal').classList.remove('hide');
  el('uparea').onclick=function(){ el('fileIn').click(); };
  el('fileIn').onchange=function(e){ handleFile(e.target.files[0]); };
  el('mCancel').onclick=closeModal;
  if(editId && el('mDel')) el('mDel').onclick=function(){ if(confirm('Delete this from catalog?')){ dbRemove(node,editId); if(sel[kind]===editId) sel[kind]=null; closeModal(); } };
  el('mSave').onclick=function(){ saveAdd(kind, editId); };
}
function closeModal(){ el('modal').classList.add('hide'); }
el('modal').addEventListener('click',function(e){ if(e.target.id==='modal') closeModal(); });

function handleFile(file){
  if(!file) return;
  var r=new FileReader();
  r.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=500, w=img.width,h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; } else if(h>max){ w=Math.round(w*max/h); h=max; }
      var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      pendingImg=cv.toDataURL('image/jpeg',0.72);
      var p=el('prev'); if(p) p.innerHTML='<img src="'+pendingImg+'">';
    };
    img.src=r.result;
  };
  r.readAsDataURL(file);
}

function saveAdd(kind, editId){
  var node=NODEMAP[kind], obj={};
  var ex = editId ? (cat[node] && cat[node][editId]) : null;
  function val(id){ var e=el(id); return e?e.value.trim():''; }
  if(kind==='supplier'){ obj={name:val('f_name'),addr:val('f_addr'),fob:val('f_fob'),hs:val('f_hs')}; if(!obj.name)return alert('Name required'); }
  else if(kind==='panel'){ obj={name:val('f_name')||'Panel',material:val('f_mat'),size:val('f_size')}; }
  else if(kind==='book'){ obj={name:val('f_name'),brand:val('f_brand')}; if(!obj.name)return alert('Name required'); }
  else if(kind==='color'){ obj={bookId:(ex&&ex.bookId)||sel.book,page:val('f_page'),number:val('f_num')}; if(!obj.page&&!obj.number)return alert('Page or number required'); }
  else if(kind==='accessory'){ obj={atype:val('f_at'),code:val('f_code'),pct:parseFloat(val('f_pct'))||0,unit:val('f_unit')}; if(!obj.atype)return alert('Type required'); }
  if(pendingImg) obj.img=pendingImg;
  if(editId){
    db.ref(OB+'/'+node+'/'+editId).update(obj).then(closeModal).catch(function(e){ alert('Save failed: '+e.message); });
  } else {
    dbPush(node,obj).then(function(newId){
      if(kind!=='accessory'){ sel[kind==='book'?'book':kind]=newId; if(kind==='book') sel.color=null; }
      closeModal();
    });
  }
}
el('btnAddAcc').onclick=function(){ openAdd('accessory'); };

/* ---------- add / edit line ---------- */
function currentLine(){
  var sup=cat.suppliers[sel.supplier]||{}, pan=cat.panelTypes[sel.panel]||{}, bk=cat.colorBooks[sel.book]||{}, col=cat.colors[sel.color]||{};
  var accs=[];
  entries(cat.accessories).forEach(function(e){
    var id=e[0],a=e[1],st=accState[id];
    if(st&&st.on){ accs.push({ atype:a.atype, code:(st.code||a.code||''), qty:(st.qty||''), img:a.img||'', unit:a.unit||'' }); }
  });
  var code=el('prodCode').value.trim();
  return {
    code:code,
    supplier:sup.name||'', supplierId:sel.supplier,
    material:pan.material||'', size:pan.size||'', panelName:pan.name||'', panelImg:pan.img||'',
    book:bk.name||'', bookImg:bk.img||'',
    page:col.page||'', number:col.number||'', colorImg:col.img||'',
    qty:el('qty').value.trim(),
    prodImg:productImg(code, pan.img||''),
    accs:accs
  };
}
el('btnAddLine').onclick=function(){
  var ln=currentLine();
  if(!ln.qty){ alert('Enter a quantity.'); return; }
  if(!ln.code){ alert('Enter a product code / name.'); return; }
  if(editingIndex>=0){ order.lines[editingIndex]=ln; editingIndex=-1; }
  else order.lines.push(ln);
  upsertProduct(ln); // remember this product so its code auto-fills next time
  // keep supplier/panel/book selected, clear color/qty/code/accs for speed
  sel.color=null; el('qty').value=''; el('prodCode').value=''; accState={};
  renderTiles(); renderAcc(); renderCards(); saveLocal();
  document.querySelector('.board').scrollIntoView({behavior:'smooth',block:'start'});
};

/* ---------- product catalog (code -> full spec) + quick add ---------- */
function pkey(c){ return (c||'').trim().toUpperCase().replace(/[.#$/\[\]]/g,'_'); }
function upsertProduct(line, fromPI){
  if(!db || !line || !line.code) return;
  var k=pkey(line.code); if(!k) return;
  var pq=parseFloat(line.qty)||0;
  var o={ code:line.code, updatedAt:Date.now() };
  function setIf(f,v){ if(v!=='' && v!=null) o[f]=v; }
  if(!fromPI) setIf('supplier', line.supplier); // PI invoice company isn't the "supplier" we track (Jacky/Belinda/…)
  setIf('material',line.material); setIf('size',line.size); setIf('panelName',line.panelName);
  setIf('book',line.book); setIf('page',line.page); setIf('number',line.number);
  setIf('colorImg',line.colorImg); setIf('bookImg',line.bookImg); setIf('prodImg',line.prodImg);
  setIf('priceUSD',line.priceUSD);
  if(line.accs && line.accs.length) o.accs=line.accs.map(function(a){ var aq=parseFloat(a.qty)||0; return { atype:a.atype||'', code:a.code||'', pct: pq?Math.round(aq/pq*100):0, unit:a.unit||'', img:a.img||'' }; });
  db.ref(OB+'/products/'+k).update(o).catch(function(){}); // merge, never wipe existing fields
}
function lineFromProduct(p,qty){
  var q=parseFloat(qty)||0;
  return {
    code:p.code, supplier:p.supplier||'', supplierId:null,
    material:p.material||'', size:p.size||'', panelName:p.panelName||'', panelImg:'',
    book:p.book||'', bookImg:p.bookImg||'', page:p.page||'', number:p.number||'', colorImg:p.colorImg||'',
    qty:String(qty),
    prodImg: p.prodImg || (p.code?(IMG_BASE+p.code.trim().toUpperCase()+'.jpg'):''),
    accs:(p.accs||[]).map(function(a){ return { atype:a.atype, code:a.code, qty:String(a.pct?Math.round(q*a.pct/100):(a.qty||'')), img:a.img||'', unit:a.unit||'' }; })
  };
}
function renderQuickInfo(){
  var raw=el('qCode').value.trim(), info=el('qInfo');
  if(!raw){ info.innerHTML=''; return; }
  var p=cat.products[pkey(raw)];
  if(p){
    info.innerHTML='<div class="qa-card">'+
      (p.colorImg?'<img src="'+esc(p.colorImg)+'">':(p.prodImg?'<img src="'+esc(p.prodImg)+'" onerror="this.style.opacity=.12">':'<img>'))+
      '<div class="qa-meta"><b>'+esc(p.code)+(p.off?' <span style="color:var(--danger);font-size:11px;font-weight:700">· DISCONTINUED</span>':'')+'</b>'+
        '<small>'+esc(p.material)+' · '+esc(p.size)+(p.supplier?(' · '+esc(p.supplier)):'')+'</small>'+
        '<small>'+esc(p.book)+(p.page?(' · '+esc(p.page)):'')+(p.number?(' · '+esc(p.number)):'')+
          ((p.accs&&p.accs.length)?(' · '+p.accs.map(function(a){return esc(a.code);}).join(',')):'')+'</small>'+
      '</div>'+
      '<input class="q" id="qQty" type="number" placeholder="qty">'+
      '<button class="btn primary" id="qAdd">Add ↵</button>'+
    '</div>';
    var qq=el('qQty'); qq.focus();
    qq.onkeydown=function(e){ if(e.key==='Enter') quickAdd(p); };
    el('qAdd').onclick=function(){ quickAdd(p); };
  } else {
    info.innerHTML='<div class="qa-new"><b style="color:var(--txt)">New code.</b> Build it with the selectors below (supplier · panel/size · book · colour + photo), set quantity, then <b>Add to order</b> — it’s saved so this code auto-fills next time.</div>';
    el('prodCode').value=raw; // pre-fill the composer code field
  }
}
function quickAdd(p){
  var qq=el('qQty'); var qty=qq?qq.value.trim():'';
  if(!qty){ alert('Enter a quantity.'); if(qq) qq.focus(); return; }
  order.lines.push(lineFromProduct(p,qty));
  renderCards(); saveLocal();
  el('qCode').value=''; el('qInfo').innerHTML=''; el('qCode').focus();
}
el('qCode').addEventListener('input',renderQuickInfo);
el('qCode').addEventListener('keydown',function(e){
  if(e.key==='Enter'){ var p=cat.products[pkey(this.value.trim())]; if(p){ e.preventDefault(); var qq=el('qQty'); if(qq) qq.focus(); } }
});

function editLine(i){
  var ln=order.lines[i]; if(!ln) return;
  editingIndex=i;
  // best-effort restore selections by matching names
  sel.supplier=findId(cat.suppliers,function(v){return v.name===ln.supplier;})||sel.supplier;
  sel.panel=findId(cat.panelTypes,function(v){return v.size===ln.size&&v.material===ln.material;})||null;
  sel.book=findId(cat.colorBooks,function(v){return v.name===ln.book;})||null;
  sel.color=findId(cat.colors,function(v){return v.page===ln.page&&v.number===ln.number;})||null;
  el('qty').value=ln.qty; el('prodCode').value=ln.code;
  accState={};
  (ln.accs||[]).forEach(function(a){
    var id=findId(cat.accessories,function(v){return v.atype===a.atype;});
    if(id) accState[id]={on:true,qty:a.qty,code:a.code,_auto:false};
  });
  renderTiles(); renderAcc();
  document.querySelector('.composer').scrollIntoView({behavior:'smooth'});
  el('btnAddLine').textContent='Update line ↵';
}
function findId(obj,pred){ var f=entries(obj).filter(function(e){return pred(e[1]);}); return f.length?f[0][0]:null; }

/* ---------- render board cards ---------- */
function renderCards(){
  var c=el('cards'); el('lineCount').textContent=order.lines.length;
  el('printTitle').textContent=(order.name||'Order')+'  —  '+new Date().toLocaleDateString();
  if(!order.lines.length){ c.innerHTML='<div class="empty">No items yet.<br>Build a line on the left and press <b>Add to order</b>.</div>'; el('btnAddLine').textContent='Add to order ↵'; return; }
  var html='';
  order.lines.forEach(function(ln,i){
    var accHtml=(ln.accs||[]).map(function(a){
      return '<div class="a">'+(a.img?'<img src="'+esc(a.img)+'">':'')+'<span><b>'+esc(a.code)+'</b> · '+esc(a.qty)+(a.unit?(' '+esc(a.unit)):' pcs')+'</span></div>';
    }).join('');
    html+='<div class="card" data-idx="'+i+'">'+
      '<div class="qtytop">'+esc(ln.qty)+' pcs</div>'+
      '<button class="rm" data-idx="'+i+'">🗑</button>'+
      (ln.prodImg?'<img class="pimg" src="'+esc(ln.prodImg)+'" onerror="this.style.opacity=.15">':'<div class="pimg"></div>')+
      '<div class="mid">'+
        '<div class="code">'+esc(ln.code)+'</div>'+
        '<div class="meta">'+esc(ln.material)+' · '+esc(ln.size)+(ln.supplier?(' · '+esc(ln.supplier)):'')+'</div>'+
        '<div class="colorline">'+
          (ln.bookImg?'<img src="'+esc(ln.bookImg)+'" title="book">':'')+
          (ln.colorImg?'<img src="'+esc(ln.colorImg)+'" title="colour">':'')+
          '<b>'+esc(ln.book)+(ln.page?(' · '+esc(ln.page)):'')+(ln.number?(' · '+esc(ln.number)):'')+'</b>'+
        '</div>'+
      '</div>'+
      '<div class="accs">'+accHtml+'</div>'+
    '</div>';
  });
  c.innerHTML=html;

    return { code:code, kind:classify(code), size:row[sizeCol]||'', qty:inum(row[qtyCol]), srcRow:dr.srcRow,
      number:reColorNum.test(colorRaw)?colorRaw:'', page:(colorRaw&&!reColorNum.test(colorRaw))?colorRaw:'',
      price:priceCol?pnum(row[priceCol]):'', die:dieCol?(row[dieCol]||''):'' };
  }).filter(Boolean);
  var lines=[], last=null;
  items.forEach(function(it){
    if(it.kind==='panel'){ last={code:it.code,size:it.size,qty:it.qty,number:it.number,page:it.page,die:it.die,priceUSD:it.price,accs:[],_srcRow:it.srcRow}; lines.push(last); }
    else { var a={code:it.code,atype:it.kind==='clip'?'Clips':(it.kind+'-Profile'),qty:it.qty,unit:it.kind==='clip'?'ctn':'',priceUSD:it.price}; if(last) last.accs.push(a); else lines.push({code:it.code,size:it.size,qty:it.qty,number:it.number,page:it.page,priceUSD:it.price,accs:[],_srcRow:it.srcRow}); }
  });
  return { lines:lines };
}
function detectSupplier(rows){
  for(var r=0;r<Math.min(rows.length,8);r++){ var c=rows[r]||{}; var ks=Object.keys(c); for(var i=0;i<ks.length;i++){ var v=c[ks[i]]; if(/co\.,?\s*ltd|import|export|decoration|material|xinyt|xiecheng|haipai/i.test(v)){ var name=v.replace(/\s+/g,' ').split(/\s*(?:address|地址|no\.?\s*\d|tel|phone)/i)[0].trim(); return name.slice(0,60); } } }
  return '';
}

function importFiles(fileList){
  var files=Array.prototype.slice.call(fileList||[]); if(!files.length) return;
  el('btnImport').textContent='reading…';
  var allLines=[], suppliers={}, errors=[];
  function importOne(file){
    return file.arrayBuffer().then(function(buf){
      var parts=unzipParts(buf);
      return partText(parts,'xl/sharedStrings.xml').then(function(sx){
        var shared=parseShared(sx);
        var sheetNames=Object.keys(parts).filter(function(n){return /^xl\/worksheets\/sheet\d+\.xml$/i.test(n);}).sort();
        var chain=Promise.resolve(null), picked=null, sup='', pickedSheet=null;
        sheetNames.forEach(function(sn){ chain=chain.then(function(){ if(picked) return; return partText(parts,sn).then(function(sx2){ var rows=sheetGrid(sx2,shared); var res=parsePI(rows); if(res&&res.lines.length){ picked=res.lines; sup=detectSupplier(rows); pickedSheet=sn; } }); }); });
        return chain.then(function(){
          if(!picked){ errors.push(file.name+': no line items found'); return; }
          return extractDrawingImages(parts,pickedSheet).then(function(list){
            var cols={}; (list||[]).forEach(function(a){ (cols[a.col]=cols[a.col]||[]).push(a); });
            var colIds=Object.keys(cols).map(Number);
            function nearest(arr,pr){ return arr.slice().sort(function(a,b){return Math.abs(a.row-pr)-Math.abs(b.row-pr);})[0]; }
            // "main" picture columns = an image on most panel rows (ignore stray singletons).
            // Column semantics vary per supplier (cover / swatch / product photo), so we keep BOTH
            // main columns and show both — the real colour swatch is always among them.
            var thr=Math.max(2,Math.floor(picked.length*0.5));
            var mainCols=colIds.filter(function(c){return cols[c].length>=thr;}); if(!mainCols.length) mainCols=colIds;
            mainCols=mainCols.sort(function(a,b){return a-b;});
            var colorCol=mainCols.length?mainCols[mainCols.length-1]:null; // rightmost ≈ swatch
            var bookCol=mainCols.length>1?mainCols[0]:null;                // leftmost ≈ cover
            picked.forEach(function(l){
              var pr=(l._srcRow||0)-1;
              if(colorCol!=null){ var s=nearest(cols[colorCol],pr); if(s) l._colorImgRaw=s.dataUrl; }
              if(bookCol!=null){ var b=nearest(cols[bookCol],pr); if(b) l._bookImgRaw=b.dataUrl; }
              l._file=file.name; l._supplier=sup;
            });
            allLines=allLines.concat(picked); if(sup) suppliers[sup]=1;
          });
        });
      });
    }).catch(function(e){ errors.push(file.name+': '+e.message); });
  }
  Promise.all(files.map(importOne)).then(function(){ el('btnImport').textContent='Import PI'; showImportPreview(allLines,Object.keys(suppliers),errors); });
}

function ensureSupplier(name){
  if(!name||!db) return null;
  var ex=findId(cat.suppliers,function(v){return (v.name||'').toLowerCase()===name.toLowerCase();});
  if(ex) return ex;
  db.ref(OB+'/suppliers').push({name:name});
  return null;
}
function ensurePanel(material,size,die){
  if(!db||!size) return;
  var ex=findId(cat.panelTypes,function(v){return v.size===size&&(v.material||'')===(material||'');});
  if(!ex) db.ref(OB+'/panelTypes').push({name:die?('Die '+die):'Panel',material:material||'',size:size});
}
function commitImport(lines,suppliers,append){
  var sup=suppliers[0]||'';
  ensureSupplier(sup);
  Promise.all(lines.map(function(l){
    return Promise.all([
      l._colorImgRaw?downscale(l._colorImgRaw,480):Promise.resolve(''),
      l._bookImgRaw?downscale(l._bookImgRaw,480):Promise.resolve('')
    ]).then(function(im){
      var mat=/165\*22|200\*12|\*7\*/.test(l.size)?'PVC':'';
      ensurePanel(mat,l.size,l.die);
      return {
        code:l.code, supplier:l._supplier||sup, supplierId:null,
        material:mat, size:l.size, panelName:l.die?('Die '+l.die):'', panelImg:'',
        book:'', bookImg:im[1]||'', page:l.page||'', number:l.number||'', colorImg:im[0]||'',
        qty:String(l.qty||''), priceUSD:(l.priceUSD===''||l.priceUSD==null)?'':l.priceUSD,
        prodImg: l.code ? (IMG_BASE+l.code.trim().toUpperCase()+'.jpg') : '',
        accs:(l.accs||[]).map(function(a){ return {atype:a.atype,code:a.code,qty:String(a.qty||''),img:'',unit:a.unit||''}; })
      };
    });
  })).then(function(newLines){
    newLines.forEach(function(l){ upsertProduct(l, true); }); // build catalog; keep PDF/manual supplier
    if(append){
      order.lines=order.lines.concat(newLines);
      renderCards(); saveLocal(); closeModal();
      // auto-save the current order to the cloud too
      order.name=el('ordName').value.trim()||order.name||('Order '+new Date().toLocaleDateString());
      saveCurrentOrder(function(){ setCloud('ok','added & saved '+newLines.length+' line(s)'); });
      return;
    }
    // replace mode: save EACH imported PI file as its own cloud order
    var groups={}, keys=[];
    newLines.forEach(function(l,i){ var fn=(lines[i]&&lines[i]._file)||'Imported PI'; if(!groups[fn]){groups[fn]=[];keys.push(fn);} groups[fn].push(l); });
    if(!db){ // offline fallback: just load into board
      order={name:keys[0].replace(/\.xlsx$/i,''), supplierId:null, lines:newLines}; el('ordName').value=order.name;
      renderCards(); saveLocal(); closeModal(); setCloud('err','imported (offline — not saved to cloud)'); return;
    }
    var saved=0, lastKey=null, lastPayload=null, chain=Promise.resolve();
    keys.forEach(function(fn){
      chain=chain.then(function(){
        var g=groups[fn]; ensureSupplier((g[0]&&g[0].supplier)||'');
        var payload={ name:fn.replace(/\.xlsx$/i,''), supplierId:null, lines:g, savedAt:Date.now(), fromImport:true };
        var r=db.ref(OB+'/orders').push();
        return r.set(payload).then(function(){ saved++; lastKey=r.key; lastPayload=payload; });
      });
    });
    chain.then(function(){
      if(lastPayload){ order={name:lastPayload.name, supplierId:lastPayload.supplierId, lines:lastPayload.lines, _id:lastKey}; el('ordName').value=order.name; }
      renderCards(); saveLocal(); closeModal();
      setCloud('ok','imported & saved '+saved+' order(s)');
      alert('✓ Imported and SAVED '+saved+' order'+(saved>1?'s':'')+' to the cloud.\nFind them all via the "Open" button.');
    }).catch(function(e){ closeModal(); alert('Import saved partially — error: '+e.message); });
  });
}
/* save the current board order to Firebase (create or update by _id) */
function saveCurrentOrder(done){
  if(!db){ if(done)done(); return; }
  var payload={ name:order.name, supplierId:order.supplierId||null, lines:order.lines, savedAt:Date.now() };
  if(order._id){ db.ref(OB+'/orders/'+order._id).set(payload).then(function(){ if(done)done(); }); }
  else{ var r=db.ref(OB+'/orders').push(); r.set(payload).then(function(){ order._id=r.key; saveLocal(); if(done)done(); }); }
}

function photoFromFile(file,done){
  if(!file){ return; }
  var r=new FileReader();
  r.onload=function(){ var img=new Image(); img.onload=function(){
    var max=560,w=img.width,h=img.height;
    if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>max){w=Math.round(w*max/h);h=max;}
    var cv=document.createElement('canvas'); cv.width=w||1; cv.height=h||1; cv.getContext('2d').drawImage(img,0,0,w,h);
    try{ done(cv.toDataURL('image/jpeg',0.72)); }catch(e){ alert('Photo error'); }
  }; img.onerror=function(){ alert('Could not read image'); }; img.src=r.result; };
  r.readAsDataURL(file);
}

    g[ref].codes.push(p.code||k); g[ref].keys.push(k);

  return g;

/* tick → add the product to the order right away */
function tickPick(k){
  if(selPos(k)>=0) return;
  var p=cat.products[k]; if(!p) return;
  var ln=lineFromProduct(p,''); ln._fromPick=k;
  prodSel.push(k); order.lines.push(ln);
  refreshSelUI(el('prodBox')); renderOrdPanel(); renderCards(); saveLocal();
}
/* untick → remove the line this tick added */
function untickPick(k){
  var i=selPos(k); if(i>=0) prodSel.splice(i,1);
  for(var j=order.lines.length-1;j>=0;j--){ if(order.lines[j]&&order.lines[j]._fromPick===k){ order.lines.splice(j,1); break; } }
  refreshSelUI(el('prodBox')); renderOrdPanel(); renderCards(); saveLocal();
}
/* refresh the picked-row highlight + sequence numbers + selection counter */
function refreshSelUI(box){
  Array.prototype.forEach.call(box.querySelectorAll('tbody tr[data-pkey]'),function(tr){
    var k=tr.getAttribute('data-pkey'), pos=selPos(k);
    tr.classList.toggle('picked',pos>=0);
    var chk=tr.querySelector('input.psel'); if(chk) chk.checked=pos>=0;
    var num=tr.querySelector('td.selnum'); if(num) num.textContent=pos>=0?(pos+1):'';
  });
  var info=el('pSelInfo'); if(info) info.textContent=prodSel.length?(prodSel.length+' selected'):'';
}
/* the side "New order" panel = a live view of order.lines */
function renderOrdPanel(){
  var list=el('ordPanelList'), cnt=el('ordPanelCount'); if(!list) return;
  if(cnt) cnt.textContent=order.lines.length;
  if(!order.lines.length){ list.innerHTML='<div class="oempty">No items yet.<br>Tick a product on the left to drop it here, or <b>Build new order</b> for a custom line.</div>'; return; }
  list.innerHTML=order.lines.map(function(ln,i){
    var img=ln.prodImg||ln.colorImg||ln.bookImg||'';
    return '<div class="oline">'+
      (img?'<img src="'+esc(img)+'" onerror="this.style.opacity=.12">':'<img>')+
      '<div class="oinfo"><div class="ocode">'+esc(ln.code||'—')+'</div>'+
        '<div class="osub">'+esc(ln.size||'')+(ln.book?(' · '+esc(ln.book)):'')+(ln.number?(' · '+esc(ln.number)):'')+'</div></div>'+
      '<input class="oqty" type="number" min="0" step="1" placeholder="qty" value="'+esc(ln.qty||'')+'" data-i="'+i+'">'+
      '<button class="orm" data-i="'+i+'" title="remove">🗑</button>'+
    '</div>';
  }).join('');
  Array.prototype.forEach.call(list.querySelectorAll('input.oqty'),function(inp){
    inp.onchange=function(){ var i=parseInt(inp.getAttribute('data-i'),10); if(order.lines[i]){ order.lines[i].qty=inp.value.trim(); saveLocal(); renderCards(); } };
  });
  Array.prototype.forEach.call(list.querySelectorAll('button.orm'),function(b){
    b.onclick=function(){ var i=parseInt(b.getAttribute('data-i'),10); var ln=order.lines[i]; order.lines.splice(i,1);
      if(ln&&ln._fromPick){ var pi=selPos(ln._fromPick); if(pi>=0) prodSel.splice(pi,1); var pb=el('prodBox'); if(pb) refreshSelUI(pb); } // keep the table tick in sync
      renderOrdPanel(); renderCards(); saveLocal(); };
  });
}
function applyProdFilter(box){
  var t=(el('pSearch')?el('pSearch').value:'').toLowerCase(), shown=0, off=0, total=0;
  Array.prototype.forEach.call(box.querySelectorAll('tbody tr[data-s]'),function(tr){
    total++; var isOff=tr.getAttribute('data-off')==='1'; if(isOff) off++;
    var vis=(tr.getAttribute('data-s').indexOf(t)>=0) && (prodShowAll || !isOff);
    tr.style.display=vis?'':'none'; if(vis) shown++;
  });
  var c=el('pCount'); if(c) c.textContent=prodShowAll?('all '+total+' · '+off+' discontinued'):(shown+' available');
  var b=el('pToggleAll'); if(b) b.textContent=prodShowAll?'▸ Only available':'▸ Show all ('+total+')';
}
function recalcBaht(box){
  Array.prototype.forEach.call(box.querySelectorAll('input.price[data-pkey]'),function(inp){
    var v=inp.value.trim(), cell=inp.parentNode.nextElementSibling; if(cell) cell.textContent=v===''?'':('฿'+bahtOf(parseFloat(v)||0));
  });
}
el('btnProducts').onclick=function(){ if(location.hash==='#products') openProducts(); else location.hash='products'; };
window.addEventListener('hashchange',function(){
  if(location.hash==='#products') openProducts();
  else if(el('prodOverlay') && !el('prodOverlay').classList.contains('hide')) el('prodOverlay').classList.add('hide');
});
if(location.hash==='#products') setTimeout(openProducts,300);

function exportProducts(){
  var list=prodVisibleList(); if(!list.length) return alert('No products.');
  el('pExport').textContent='building…';
  var COLS=['PICTURE','CODE','SUPPLIER','SIZE','BOOK','PAGE','COLOUR NO.','USD','THB ('+thbRate+')'];
  var meta=list.map(function(p){ var usd=(p.priceUSD===''||p.priceUSD==null)?'':p.priceUSD;
    return {img:p.prodImg||p.colorImg||'', cells:['',p.code,p.supplier||'',p.size||'',p.book||'',p.page||'',p.number||'',usd,usd!==''?bahtOf(usd):'']}; });
  Promise.all(meta.map(function(m){ return imgToU8(m.img); })).then(function(imgs){
    var media=[],drawings=[],drawRels=[],picId=2;
    imgs.forEach(function(u8,i){ if(!u8)return; var mi=media.length+1,rid='rId'+mi,file='image'+mi+'.jpeg';
      media.push({name:'xl/media/'+file,data:u8});
      drawRels.push('<Relationship Id="'+rid+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/'+file+'"/>');
      var cx=88*EMU,cy=88*EMU,off=6000;
      drawings.push('<xdr:oneCellAnchor><xdr:from><xdr:col>0</xdr:col><xdr:colOff>'+off+'</xdr:colOff><xdr:row>'+(i+1)+'</xdr:row><xdr:rowOff>'+off+'</xdr:rowOff></xdr:from><xdr:ext cx="'+cx+'" cy="'+cy+'"/><xdr:pic><xdr:nvPicPr><xdr:cNvPr id="'+(picId++)+'" name="p'+mi+'"/><xdr:cNvPicPr/></xdr:nvPicPr><xdr:blipFill><a:blip xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" r:embed="'+rid+'"/><a:stretch><a:fillRect/></a:stretch></xdr:blipFill><xdr:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="'+cx+'" cy="'+cy+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></xdr:spPr></xdr:pic><xdr:clientData/></xdr:oneCellAnchor>');
    });
    var hasImg=media.length>0;
    function cellXml(ref,val,isNum){ if(val===''||val==null) return '<c r="'+ref+'"/>'; if(isNum&&/^-?\d+(\.\d+)?$/.test(String(val).trim())) return '<c r="'+ref+'"><v>'+val+'</v></c>'; return '<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+xesc(val)+'</t></is></c>'; }
    var COLL=['A','B','C','D','E','F','G','H','I'];
    var sheetRows='<row r="1" ht="20" customHeight="1">'+COLS.map(function(h,i){return cellXml(COLL[i]+'1',h,false);}).join('')+'</row>';
    meta.forEach(function(m,i){ var rr=i+2; sheetRows+='<row r="'+rr+'" ht="70" customHeight="1">'+m.cells.map(function(v,ci){return cellXml(COLL[ci]+rr,v,ci>=7);}).join('')+'</row>'; });
    var colsXml='<cols><col min="1" max="1" width="13" customWidth="1"/><col min="2" max="2" width="12" customWidth="1"/><col min="3" max="3" width="12" customWidth="1"/><col min="4" max="4" width="16" customWidth="1"/><col min="5" max="5" width="16" customWidth="1"/><col min="6" max="6" width="16" customWidth="1"/><col min="7" max="7" width="14" customWidth="1"/><col min="8" max="9" width="12" customWidth="1"/></cols>';
    var sheetXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'+colsXml+'<sheetData>'+sheetRows+'</sheetData>'+(hasImg?'<drawing r:id="rId1"/>':'')+'</worksheet>';
    var files=[
      {name:'[Content_Types].xml',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Default Extension="jpeg" ContentType="image/jpeg"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>'+(hasImg?'<Override PartName="/xl/drawings/drawing1.xml" ContentType="application/vnd.openxmlformats-officedocument.drawing+xml"/>':'')+'</Types>')},
      {name:'_rels/.rels',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')},
      {name:'xl/workbook.xml',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Products" sheetId="1" r:id="rId1"/></sheets></workbook>')},
      {name:'xl/_rels/workbook.xml.rels',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>')},
      {name:'xl/worksheets/sheet1.xml',data:strU8(sheetXml)}
    ];
    if(hasImg){
      files.push({name:'xl/worksheets/_rels/sheet1.xml.rels',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/drawing" Target="../drawings/drawing1.xml"/></Relationships>')});
      files.push({name:'xl/drawings/drawing1.xml',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><xdr:wsDr xmlns:xdr="http://schemas.openxmlformats.org/drawingml/2006/spreadsheetDrawing" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">'+drawings.join('')+'</xdr:wsDr>')});
      files.push({name:'xl/drawings/_rels/drawing1.xml.rels',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+drawRels.join('')+'</Relationships>')});
      media.forEach(function(m){ files.push(m); });
    }
    var blob=makeZip(files), a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='KP_products_'+new Date().toISOString().slice(0,10)+'.xlsx'; a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); },4000);
    el('pExport').textContent='Export Excel';
  }).catch(function(e){ el('pExport').textContent='Export Excel'; alert('Export failed: '+e.message); });
}

/* ---------- Import directly from Google Drive ---------- */
var GDRIVE_CLIENT_ID='794246593779-35lkq73cmbf9hihgj1tdofajsv73rkhi.apps.googleusercontent.com'; /* OAuth Web Client ID (GCP kp-wallpanel) */
var gdToken=null, gdTokenClient=null;
function gdReady(){ return typeof google!=='undefined' && google.accounts && google.accounts.oauth2; }
function gdImport(){
  if(!GDRIVE_CLIENT_ID){ alert('Google Drive import is not set up yet.\nAn OAuth Client ID still needs to be added.'); return; }
  if(!gdReady()){ alert('Google library still loading — try again in a moment.'); return; }
  if(!gdTokenClient){ gdTokenClient=google.accounts.oauth2.initTokenClient({ client_id:GDRIVE_CLIENT_ID, scope:'https://www.googleapis.com/auth/drive.readonly', callback:function(resp){ if(resp&&resp.access_token){ gdToken=resp.access_token; gdBrowseStart(); } else alert('Google sign-in failed.'); } }); }
  gdTokenClient.requestAccessToken({ prompt: gdToken?'':'consent' });
}
function gdApi(url){ return fetch(url,{ headers:{ Authorization:'Bearer '+gdToken } }); }
var gdStack=[{id:'root',name:'My Drive'}];
var gdSel={};
function gdBrowseStart(){ gdStack=[{id:'root',name:'My Drive'}]; gdSel={}; gdBrowse(); }
function gdBrowse(){
  var cur=gdStack[gdStack.length-1];
  var q = cur.id==='shared' ? "sharedWithMe=true and trashed=false" : "'"+cur.id+"' in parents and trashed=false";
  var url='https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&orderBy='+encodeURIComponent('folder,name')+'&pageSize=500&fields=files(id,name,mimeType,size,modifiedTime)&supportsAllDrives=true&includeItemsFromAllDrives=true';
  gdApi(url).then(function(r){ return r.json(); }).then(function(d){ if(d.error){ alert('Drive: '+d.error.message); return; } gdRender(d.files||[],false); }).catch(function(e){ alert('Drive error: '+e.message); });
}
function gdSearchAll(term){
  var q="mimeType='application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' and trashed=false and name contains '"+term.replace(/'/g,"\\'")+"'";
  var url='https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&orderBy=modifiedTime desc&pageSize=200&fields=files(id,name,mimeType,size,modifiedTime)&supportsAllDrives=true&includeItemsFromAllDrives=true';
  gdApi(url).then(function(r){ return r.json(); }).then(function(d){ if(d.error){ alert('Drive: '+d.error.message); return; } gdRender(d.files||[],true); }).catch(function(e){ alert('Drive error: '+e.message); });
}
function gdIsXlsx(f){ return f.mimeType==='application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' || /\.xlsx$/i.test(f.name); }
function gdRender(files,searchMode){
  var box=el('modalBox');
  var folders=files.filter(function(f){ return f.mimeType==='application/vnd.google-apps.folder'; });
  var xlsx=files.filter(gdIsXlsx);
  var atRoot=gdStack.length===1 && gdStack[0].id==='root';
  var nav = searchMode
    ? '<a href="#" id="gdBack" style="color:var(--accent)">← back to folders</a>'
    : gdStack.map(function(n,i){ return '<a href="#" data-crumb="'+i+'" style="color:var(--accent)">'+esc(n.name)+'</a>'; }).join(' <span style="color:var(--muted)">/</span> ');
  var html='';
  if(!searchMode && atRoot) html+='<div class="accrow" data-folder="shared" data-fname="Shared with me" style="cursor:pointer"><div class="an"><b>📤 Shared with me</b></div></div>';
  folders.forEach(function(f){ html+='<div class="accrow" data-folder="'+f.id+'" data-fname="'+esc(f.name)+'" style="cursor:pointer"><div class="an"><b>📁 '+esc(f.name)+'</b></div></div>'; });
  xlsx.forEach(function(f){ var kb=f.size?Math.round(f.size/1024):0; var big=kb>=150; var ck=gdSel[f.id]?'checked':''; html+='<label class="accrow" style="cursor:pointer"><input type="checkbox" class="gdchk" data-id="'+f.id+'" data-name="'+esc(f.name)+'" '+ck+' style="width:auto"><div class="an"><b>'+esc(f.name)+'</b><small>'+(kb?kb+' KB · ':'')+esc((f.modifiedTime||'').slice(0,10))+(big?'':' · small')+'</small></div></label>'; });
  if(!html) html='<div class="empty">Empty folder.</div>';
  box.innerHTML='<h3>Google Drive</h3>'+
    '<div style="font-size:12px;margin-bottom:6px">'+nav+'</div>'+
    '<div class="row" style="margin-bottom:8px"><input class="field" id="gdTerm" placeholder="search all Drive by name…"><button class="btn" id="gdGo">Search</button></div>'+
    '<div style="max-height:44vh;overflow:auto;display:flex;flex-direction:column;gap:4px">'+html+'</div>'+
    '<div class="foot"><span id="gdSelCount" style="margin-right:auto;color:var(--muted);font-size:12px"></span><button class="btn ghost" id="mCancel">Close</button><button class="btn primary" id="gdImp">Import selected</button></div>';
  el('modal').classList.remove('hide');
  el('mCancel').onclick=closeModal;
  var back=el('gdBack'); if(back) back.onclick=function(e){ e.preventDefault(); gdBrowse(); };
  el('gdGo').onclick=function(){ var t=el('gdTerm').value.trim(); if(t) gdSearchAll(t); else gdBrowse(); };
  el('gdTerm').onkeydown=function(e){ if(e.key==='Enter'){ var t=this.value.trim(); if(t) gdSearchAll(t); else gdBrowse(); } };
  Array.prototype.forEach.call(box.querySelectorAll('[data-folder]'),function(r){ r.onclick=function(e){ e.preventDefault(); gdStack.push({id:r.getAttribute('data-folder'),name:r.getAttribute('data-fname')}); gdBrowse(); }; });
  Array.prototype.forEach.call(box.querySelectorAll('[data-crumb]'),function(a){ a.onclick=function(e){ e.preventDefault(); gdStack=gdStack.slice(0,(+a.getAttribute('data-crumb'))+1); gdBrowse(); }; });
  Array.prototype.forEach.call(box.querySelectorAll('.gdchk'),function(c){ c.onchange=function(){ if(c.checked) gdSel[c.getAttribute('data-id')]=c.getAttribute('data-name'); else delete gdSel[c.getAttribute('data-id')]; gdUpdateSel(); }; });
  el('gdImp').onclick=gdDoImport;
  gdUpdateSel();
}
function gdUpdateSel(){ var n=Object.keys(gdSel).length; var e=el('gdSelCount'); if(e) e.textContent=n?(n+' selected'):''; var b=el('gdImp'); if(b) b.textContent=n?('Import '+n):'Import selected'; }
function gdDoImport(){
  var ids=Object.keys(gdSel); if(!ids.length){ alert('Tick at least one .xlsx file first.'); return; }
  var b=el('gdImp'); b.textContent='downloading…'; b.disabled=true;
  Promise.all(ids.map(function(id){ var name=gdSel[id];
    return gdApi('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media&supportsAllDrives=true').then(function(r){ return r.arrayBuffer(); }).then(function(ab){ return { name:name, arrayBuffer:function(){ return Promise.resolve(ab); } }; });
  })).then(function(fileObjs){ importFiles(fileObjs); }).catch(function(e){ alert('Download failed: '+e.message); b.textContent='Import selected'; b.disabled=false; });
}
el('btnDrive').onclick=gdImport;

/* keyboard: Enter in code field adds line */
el('prodCode').addEventListener('keydown',function(e){ if(e.key==='Enter') el('btnAddLine').click(); });

/* ---------- init ---------- */
loadLocal();
renderCards();
renderAcc();
})();
